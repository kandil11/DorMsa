<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Egypt Real Estate Dashboard | 6th October & Sheikh Zayed Rentals</title>
  <meta name="description" content="Browse and filter rental properties across 6th of October and Sheikh Zayed from Bayut, Dubizzle, and PropertyFinder." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header class="header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-icon">🏙️</div>
      <div>
        <h1 class="brand-title">Egypt Real Estate</h1>
        <p class="brand-sub">6th October & Sheikh Zayed · Live Database</p>
      </div>
    </div>
    <div class="header-meta" id="headerMeta">
      <span class="badge badge-db" id="totalBadge">— listings</span>
      <span class="db-status" id="dbStatus">
        <span class="dot dot-pulse"></span> Connecting…
      </span>
    </div>
  </div>
</header>

<!-- ── Stats Row ───────────────────────────────────────────────────────────── -->
<section class="stats-row" id="statsRow">
  <div class="stat-card" id="sc-total">
    <div class="stat-icon">📋</div>
    <div class="stat-body">
      <div class="stat-value" id="st-total">—</div>
      <div class="stat-label">Total Listings</div>
    </div>
  </div>
  <div class="stat-card" id="sc-avg">
    <div class="stat-icon">💰</div>
    <div class="stat-body">
      <div class="stat-value" id="st-avg">—</div>
      <div class="stat-label">Avg Monthly Rent (EGP)</div>
    </div>
  </div>
  <div class="stat-card" id="sc-area">
    <div class="stat-icon">📍</div>
    <div class="stat-body">
      <div class="stat-value" id="st-areas">—</div>
      <div class="stat-label">Areas Covered</div>
    </div>
  </div>
  <div class="stat-card" id="sc-src">
    <div class="stat-icon">🌐</div>
    <div class="stat-body">
      <div class="stat-value" id="st-sources">—</div>
      <div class="stat-label">Data Sources</div>
    </div>
  </div>
</section>

<!-- ── Source Pills ────────────────────────────────────────────────────────── -->
<section class="source-pills-section">
  <div class="source-pills" id="sourcePills"></div>
</section>

<!-- ── Main ───────────────────────────────────────────────────────────────── -->
<main class="main-layout">

  <!-- Filters Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-title">
      <span>🔍</span> Filters
    </div>

    <div class="filter-group">
      <label class="filter-label">Search</label>
      <input type="text" id="searchInput" class="filter-input" placeholder="Compound, location, title…" />
    </div>

    <div class="filter-group">
      <label class="filter-label">Area</label>
      <select id="areaFilter" class="filter-select">
        <option value="all">All Areas</option>
        <option value="6th_of_october">6th of October</option>
        <option value="sheikh_zayed">Sheikh Zayed</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Category</label>
      <select id="categoryFilter" class="filter-select">
        <option value="all">All Categories</option>
        <option value="apartment">Apartment</option>
        <option value="villa">Villa</option>
        <option value="studio">Studio</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Source</label>
      <select id="sourceFilter" class="filter-select">
        <option value="all">All Sources</option>
        <option value="bayut.eg">Bayut.eg</option>
        <option value="dubizzle.com.eg">Dubizzle</option>
        <option value="propertyfinder.eg">PropertyFinder</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Bedrooms</label>
      <select id="bedsFilter" class="filter-select">
        <option value="all">Any</option>
        <option value="0">Studio / 0</option>
        <option value="1">1 Bed</option>
        <option value="2">2 Beds</option>
        <option value="3">3 Beds</option>
        <option value="4">4+ Beds</option>
      </select>
    </div>

    <div class="filter-group">
      <label class="filter-label">Min Price (EGP)</label>
      <input type="number" id="minPrice" class="filter-input" placeholder="e.g. 10000" />
    </div>

    <div class="filter-group">
      <label class="filter-label">Max Price (EGP)</label>
      <input type="number" id="maxPrice" class="filter-input" placeholder="e.g. 100000" />
    </div>

    <div class="filter-group">
      <label class="filter-label">Sort By</label>
      <select id="sortFilter" class="filter-select">
        <option value="scraped_at">Newest First</option>
        <option value="price.amount_egp">Price: Low → High</option>
        <option value="-price.amount_egp">Price: High → Low</option>
        <option value="bedrooms">Bedrooms</option>
        <option value="area_sqm">Area (m²)</option>
      </select>
    </div>

    <button id="applyFilters" class="btn-apply">Apply Filters</button>
    <button id="resetFilters" class="btn-reset">Reset</button>

    <!-- Mini charts -->
    <div class="mini-chart-title">By Category</div>
    <div id="catChart" class="mini-bar-chart"></div>

    <div class="mini-chart-title" style="margin-top:1.5rem">By Source</div>
    <div id="srcChart" class="mini-bar-chart"></div>
  </aside>

  <!-- Listings Grid -->
  <section class="listings-section">
    <div class="listings-header">
      <p class="results-count" id="resultsCount">Loading…</p>
      <div class="view-toggle">
        <button id="gridView" class="view-btn active" title="Grid view">⊞</button>
        <button id="listView" class="view-btn" title="List view">☰</button>
      </div>
    </div>

    <div class="listings-grid" id="listingsGrid"></div>

    <div class="pagination" id="pagination"></div>
  </section>
</main>

<!-- ── Modal ────────────────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-content" id="modalContent"></div>
  </div>
</div>

<!-- ── Toast ─────────────────────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
